schema_version: 1
asset_type: workflow
id: document-summarisation-workflow
name: Document Summarisation Workflow
version: 0.1.0
status: draft
owner:
  team: Knowledge Management
  accountable_person: TBD
purpose: Summarise internal documents into structured notes for employee search and review.
trigger: User submits an approved internal document.
steps:
  - id: classify
    type: control
    description: Confirm document classification is permitted.
  - id: summarise
    type: ai
    description: Generate structured summary using approved prompt.
  - id: review
    type: human_review
    description: Human reviewer approves before publication.
data:
  sources:
    - approved internal documents
  classification: internal
controls:
  human_in_the_loop: true
  audit_logging: true
evaluations:
  plan: examples/document-summarisation-workflow/evaluation-plan.md
risks:
  assessment: examples/document-summarisation-workflow/risk-assessment.md

