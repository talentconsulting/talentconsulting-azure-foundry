name: openapi-spec-generator
display_name: "OpenAPI Spec Generator"
description: "Scans a repository path and generates OpenAPI 3.1 JSON specifications for discovered API endpoints."
version: "1.0.0"

agent:
  object: agent.version
  kind: prompt
  model: gpt-4o
  reasoning:
    effort: medium

structured_inputs:
  repository:
    type: string
    description: "GitHub repository to scan, for example TalentConsulting/example-api"
    default: "TalentConsulting/example-api"
  scanPath:
    type: string
    description: "File or directory path to scan for API endpoints, for example src"
    default: "."

outputs:
  type: json_schema
  json_schema:
    name: openapi_specs_output
    strict: false
    schema:
      type: object
      properties:
        specs:
          type: array
          items:
            type: object
            properties:
              domain-api:
                type: string
                description: "Domain API identifier or service API name, formatted in lowercase kebab-case where possible."
              open-api:
                type: object
                description: "Complete OpenAPI 3.1 JSON object for this domain API."
                additionalProperties: true
              fileName:
                type: string
                description: "Suggested output filename for this OpenAPI JSON file."
              serviceName:
                type: string
                description: "Detected API/service name."
              sourcePath:
                type: string
                description: "Repository path used to generate this spec."
              contentType:
                type: string
                enum:
                  - "application/json"
            required:
              - domain-api
              - open-api
              - fileName
              - serviceName
              - sourcePath
              - contentType
            additionalProperties: false
      required:
        - specs
      additionalProperties: false

files:
  instructions: instructions.md
  tools: tools.yaml
  guardrails: guardrails.md
  evaluations: evaluations.md
  release_notes: release-notes.md
