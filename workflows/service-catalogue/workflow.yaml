kind: workflow
trigger:
  kind: OnConversationStart
  id: trigger_service_catalogue
  actions:
    - kind: InvokeAzureAgent
      id: detect_changed_repositories
      agent:
        name: repository-change-detector
      conversationId: =System.ConversationId
      input:
        manifestRepository: =System.Activity.Text
        manifestPath: repoManifest.json
      output:
        autoSend: true
        responseObject: Local.RepositoryDetectorResponse
      auth:
        scope: service

    - kind: SetVariable
      id: set_repositories
      variable: Local.Repositories
      value: =Local.RepositoryDetectorResponse.repositories

    - kind: Foreach
      id: for_each_repository
      items: =Local.Repositories
      value: Local.Repository
      actions:
        - kind: InvokeAzureAgent
          id: generate_openapi_specs
          agent:
            name: openapi-spec-generator
          conversationId: =System.ConversationId
          input:
            repository: =Local.Repository.repoURL
            scanPath: "."
            openApiTitle: =Local.Repository.repoName
            openApiVersion: "1.0.0"
          output:
            autoSend: true
            responseObject: Local.OpenApiGeneratorResponse
          auth:
            scope: service

        - kind: SetVariable
          id: set_generated_specs
          variable: Local.GeneratedSpecs
          value: =Local.OpenApiGeneratorResponse.'specs'

        - kind: SetVariable
          id: set_generated_spec_changes
          variable: Local.GeneratedSpecChanges
          value: '=ForAll(Local.GeneratedSpecs, {filename: ThisRecord.fileName, content: ThisRecord.''open-api'', repository: Local.Repository.repoURL, path: "openapi-specs"})'

        - kind: InvokeAzureAgent
          id: create_openapi_specs_pull_request
          agent:
            name: repository-file-pr-creator
          conversationId: =System.ConversationId
          input:
            changes: =Local.GeneratedSpecChanges
            pullRequestTitle: =Concatenate("Add generated OpenAPI specs for ", Local.Repository.repoName)
            pullRequestBody: =Concatenate("Generated OpenAPI specifications for ", Local.Repository.repoName, ".")
          output:
            autoSend: true
            responseObject: Local.OpenApiPullRequestResponse
          auth:
            scope: service
id: ""
name: Service Catalogue Workflow
description: Detect changed repositories, generate Swagger/OpenAPI specs, and open pull requests with generated specs.
