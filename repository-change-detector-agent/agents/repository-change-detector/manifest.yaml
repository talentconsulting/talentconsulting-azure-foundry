name: repository-change-detector
display_name: "Repository Change Detector"
description: "Identifies repositories where the manifest latestCommit is missing or out of date compared with GitHub."
version: "1.0.0"

agent:
  object: agent.version
  kind: prompt
  model: gpt-5.1-codex-mini
  reasoning:
    effort: low

inputs:
  manifestRepository:
    type: string
    required: true
    description: "GitHub repository containing the manifest, for example TalentConsulting/DomainExplorer"
  manifestPath:
    type: string
    required: true
    description: "Path to the manifest file, for example repoManifest.json"

outputs:
  type: json_schema
  json_schema:
    name: repositories_to_update
    strict: true
    schema:
      type: object
      properties:
        repositories:
          type: array
          items:
            type: object
            properties:
              repoName:
                type: string
              repoURL:
                type: string
            required:
              - repoName
              - repoURL
            additionalProperties: false
      required:
        - repositories
      additionalProperties: false

files:
  instructions: instructions.md
  tools: tools.yaml
  guardrails: guardrails.md
  evaluations: evaluations.md
  release_notes: release-notes.md
