name: Deploy Service Catalogue Workflow

on:
  push:
    branches:
      - main
    paths:
      - "workflows/service-catalogue/**"
      - "scripts/run-ai-source-control-workflow.py"
      - "scripts/validate-workflow.py"
      - "requirements-agent-deploy.txt"
      - ".github/workflows/deploy-service-catalogue.workflow.yml"

  workflow_dispatch:
    inputs:
      deploy_to_foundry:
        description: "Deploy workflows/service-catalogue/workflow.yaml to Azure AI Foundry"
        required: true
        default: true
        type: boolean

jobs:
  package:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-agent-deploy.txt

      - name: Validate workflow source
        run: |
          python scripts/validate-workflow.py --workflow-dir workflows/service-catalogue
          python -m py_compile scripts/run-ai-source-control-workflow.py scripts/validate-workflow.py

      - name: Package workflow code
        run: |
          mkdir -p outputs
          tar -czf outputs/service-catalogue-workflow-code.tgz \
            workflows/service-catalogue \
            scripts/run-ai-source-control-workflow.py \
            scripts/validate-workflow.py \
            requirements-agent-deploy.txt

      - name: Upload workflow code package
        uses: actions/upload-artifact@v4
        with:
          name: service-catalogue-workflow-code
          path: outputs/service-catalogue-workflow-code.tgz

  deploy-foundry:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_to_foundry }}
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      id-token: write
      contents: read

    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Azure login configuration
        run: |
          missing=0

          if [ -z "$AZURE_CLIENT_ID" ]; then
            echo "::error::Missing environment secret AZURE_CLIENT_ID."
            missing=1
          fi

          if [ -z "$AZURE_TENANT_ID" ]; then
            echo "::error::Missing environment secret AZURE_TENANT_ID."
            missing=1
          fi

          if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "::error::Missing environment secret AZURE_SUBSCRIPTION_ID."
            missing=1
          fi

          if [ -z "$AZURE_AI_PROJECT_ENDPOINT" ]; then
            echo "::error::Missing environment secret AZURE_AI_PROJECT_ENDPOINT."
            missing=1
          fi

          exit "$missing"

      - uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-agent-deploy.txt

      - name: Deploy workflow to Azure AI Foundry
        run: |
          python scripts/deploy-workflow.py \
            --workflow-dir workflows/service-catalogue \
            --generated-workflow outputs/service-catalogue.workflow.generated.yml

      - name: Upload deployed workflow definition
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-catalogue-foundry-workflow
          path: outputs/service-catalogue.workflow.generated.yml
