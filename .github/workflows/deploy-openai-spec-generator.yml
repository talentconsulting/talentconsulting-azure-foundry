name: Deploy OpenAPI Spec Generator

on:
  push:
    branches:
      - main
    paths:
      - "agents/openapi-spec-generator/**"
      - "scripts/deploy-agent.py"
      - "requirements-agent-deploy.txt"
      - ".github/workflows/deploy-openapi-spec-generator.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-agent-deploy.txt

      - name: Deploy OpenAPI Spec Generator
        run: |
          python scripts/deploy-agent.py --agent-dir agents/openapi-spec-generator
        env:
          AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}