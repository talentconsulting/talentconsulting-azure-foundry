name: repository-file-pr-creator
display_name: "Repository File PR Creator"
description: "Creates a branch, commits requested files to a GitHub repository, and opens a pull request."
version: "1.0.0"

agent:
  object: agent.version
  kind: prompt
  model: gpt-4o
  reasoning:
    effort: medium

structured_inputs:
  changes:
    type: array
    required: false
    description: "Files to create or update. Every item must target the same repository."
    items:
      type: object
      properties:
        filename:
          type: string
          description: "File name to write, for example accounts-api-openapi.yml."
        content:
          type: string
          description: "Complete file content to write."
        repository:
          type: string
          description: "GitHub repository in owner/name or https://github.com/owner/name form."
        path:
          type: string
          description: "Directory path inside the repository where the file should be written."
      required:
        - filename
        - content
        - repository
        - path
      additionalProperties: false
  repository:
    type: string
    required: false
    description: "Repository to use when converting a workflow OpenAPI generator response into file changes."
  path:
    type: string
    required: false
    description: "Directory path to use when converting a workflow OpenAPI generator response into file changes."
  openApiGeneratorResponse:
    type: object
    required: false
    description: "Optional OpenAPI generator response containing a specs array to convert into file changes."
  branchName:
    type: string
    required: false
    description: "Optional branch name. If omitted, generate a deterministic source-control branch name."
  pullRequestTitle:
    type: string
    required: false
    description: "Optional pull request title."
  pullRequestBody:
    type: string
    required: false
    description: "Optional pull request body."

outputs:
  type: json_schema
  json_schema:
    name: repository_file_pr_result
    strict: true
    schema:
      type: object
      properties:
        success:
          type: boolean
        repository:
          type: string
        branchName:
          type: string
        commitSha:
          type: string
        pullRequestUrl:
          type: string
        pullRequestNumber:
          type: integer
        filesWritten:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              action:
                type: string
                enum:
                  - created
                  - updated
                  - unchanged
            required:
              - path
              - action
            additionalProperties: false
        errors:
          type: array
          items:
            type: string
      required:
        - success
        - repository
        - branchName
        - commitSha
        - pullRequestUrl
        - pullRequestNumber
        - filesWritten
        - errors
      additionalProperties: false

files:
  instructions: instructions.md
  tools: tools.yaml
  guardrails: guardrails.md
  evaluations: evaluations.md
  release_notes: release-notes.md
