name: Deploy Agents

on:
  push:
    branches:
      - main
    paths:
      - "agents/**"
      - "scripts/deploy-agent.py"
      - "requirements-agent-deploy.txt"
      - ".github/workflows/deploy-agents.yml"

  workflow_dispatch:
    inputs:
      agent_name:
        description: "Optional agent folder name to deploy, e.g. repository-change-detector"
        required: false
        type: string

jobs:
  detect-agents:
    runs-on: ubuntu-latest
    outputs:
      agent_dirs: ${{ steps.detect.outputs.agent_dirs }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed agents
        id: detect
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.agent_name }}" ]; then
            AGENTS="agents/${{ github.event.inputs.agent_name }}"
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

            AGENTS=$(echo "$CHANGED_FILES" \
              | grep "^agents/[^/]*/" \
              | cut -d "/" -f 1,2 \
              | sort -u \
              | tr '\n' ' ')
          fi

          if [ -z "$AGENTS" ]; then
            echo "No changed agents found."
            echo 'agent_dirs=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          JSON=$(printf '%s\n' $AGENTS | jq -R . | jq -s -c .)
          echo "agent_dirs=$JSON" >> "$GITHUB_OUTPUT"
          echo "Detected agents: $JSON"

  deploy-agents:
    needs: detect-agents
    if: needs.detect-agents.outputs.agent_dirs != '[]'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        agent_dir: ${{ fromJson(needs.detect-agents.outputs.agent_dirs) }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements-agent-deploy.txt

      - name: Deploy agent
        run: |
          python scripts/deploy-agent.py --agent-dir "${{ matrix.agent_dir }}"
        env:
          AZURE_AI_PROJECT_ENDPOINT: ${{ secrets.AZURE_AI_PROJECT_ENDPOINT }}