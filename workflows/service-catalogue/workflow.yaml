kind: workflow
trigger:
  kind: OnConversationStart
  id: trigger_service_catalogue
  actions:
    - kind: InvokeAzureAgent
      id: detect_changed_repositories
      agent:
        name: repository-change-detector
      conversationId: =System.ConversationId
      input:
        manifestRepository: =System.Activity.Text
        manifestPath: repoManifest.json
      output:
        autoSend: true
        responseObject: Local.RepositoryDetectorResponse
      auth:
        scope: service

    - kind: SetVariable
      id: set_repositories
      variable: Local.Repositories
      value: =Local.RepositoryDetectorResponse.repositories

    - kind: Foreach
      id: for_each_repository
      items: =Local.Repositories
      value: Local.Repository
      actions:
        - kind: InvokeAzureAgent
          id: generate_openapi_specs
          agent:
            name: openapi-spec-generator
          conversationId: =System.ConversationId
          input:
            repository: =Local.Repository.repoURL
            scanPath: "."
            openApiTitle: =Local.Repository.repoName
            openApiVersion: "1.0.0"
          output:
            autoSend: true
            responseObject: Local.OpenApiGeneratorResponse
          auth:
            scope: service

        - kind: SetVariable
          id: set_generated_specs
          variable: Local.GeneratedSpecs
          value: =Local.OpenApiGeneratorResponse.specs

        - kind: Foreach
          id: for_each_generated_spec
          items: =Local.GeneratedSpecs
          value: Local.GeneratedSpec
          actions:
            - kind: InvokeAzureAgent
              id: review_openapi_spec
              agent:
                name: openapi-spec-reviewer
              conversationId: =System.ConversationId
              input:
                repoName: =Local.Repository.repoName
                repoURL: =Local.Repository.repoURL
                domain-api: =Local.GeneratedSpec.domain-api
                fileName: =Local.GeneratedSpec.fileName
                serviceName: =Local.GeneratedSpec.serviceName
                sourcePath: =Local.GeneratedSpec.sourcePath
                contentType: =Local.GeneratedSpec.contentType
                open-api: =Local.GeneratedSpec.open-api
              output:
                autoSend: true
                responseObject: Local.OpenApiReviewResponse
              auth:
                scope: service
id: ""
name: Service Catalogue Workflow
description: Detect changed repositories, generate Swagger/OpenAPI specs, and review each generated spec.
